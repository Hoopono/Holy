<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Copa do Mundo — Livro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --leather:#3a2416;
    --leather-dark:#241409;
    --gold:#cba135;
    --gold-light:#e8cf8a;
    --paper:#f6efdd;
    --paper-shadow:#e3d6b4;
    --ink:#2b2014;
    --grass:#1c6b3f;
  }
  *{box-sizing:border-box;}
  html{ height:100%; }
  body{
    margin:0;
    width:100%;
    height:100%;
    background:#060301;
    font-family: Georgia, 'Times New Roman', serif;
    color: var(--ink);
    overflow:hidden;
  }
  @media (prefers-reduced-motion: reduce){
    *{transition-duration:0.01ms !important; animation-duration:0.01ms !important;}
  }

  .stage{
    position:absolute;
    top:0; left:0; right:0; bottom:0;
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    perspective: 2200px;
    overflow:hidden;
    background: radial-gradient(ellipse at 50% 45%, #241509 0%, #120a04 55%, #060301 100%);
  }

  /* partículas ambientes douradas */
  .spark{
    position:absolute;
    border-radius:50%;
    background: var(--gold-light);
    opacity:0;
    pointer-events:none;
    box-shadow: 0 0 6px 1px rgba(232,207,138,0.8);
    animation: spark-float linear infinite;
  }
  @keyframes spark-float{
    0%{ opacity:0; transform: translateY(0) scale(0.6); }
    10%{ opacity:0.9; }
    85%{ opacity:0.7; }
    100%{ opacity:0; transform: translateY(-160px) scale(1); }
  }

  #sparks{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    pointer-events:none;
  }

  /* feixe de luz girando atrás da capa */
  .spotlight{
    position:absolute;
    width:140vmax;
    height:140vmax;
    background: conic-gradient(from 0deg, transparent 0deg, rgba(203,161,53,0.10) 8deg, transparent 22deg, transparent 360deg);
    animation: spin-slow 14s linear infinite;
    pointer-events:none;
  }
  @keyframes spin-slow{
    from{ transform: rotate(0deg); }
    to{ transform: rotate(360deg); }
  }

  /* ---------------- CAPA ---------------- */
  #cover{
    width:min(92%, 540px);
    height:min(88%, 720px);
    background:
      radial-gradient(circle at 30% 20%, #4a2f1c, var(--leather) 60%, var(--leather-dark) 100%);
    border:10px solid var(--leather-dark);
    border-radius:6px;
    box-shadow:
      0 30px 60px rgba(0,0,0,0.6),
      inset 0 0 40px rgba(0,0,0,0.5);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    cursor:pointer;
    transform-origin: left center;
    transform-style: preserve-3d;
    position:relative;
    z-index:5;
    opacity:0;
    transform: translateY(70px) scale(0.82) rotateX(18deg);
    animation: cover-arrive 1.3s cubic-bezier(.16,.9,.25,1) 0.15s forwards;
  }
  @keyframes cover-arrive{
    0%{ opacity:0; transform: translateY(70px) scale(0.8) rotateX(20deg); filter: blur(6px); }
    60%{ opacity:1; filter: blur(0); }
    100%{ opacity:1; transform: translateY(0) scale(1) rotateX(0deg); filter: blur(0); }
  }
  #cover.opening{
    animation: none;
    transition: transform 1s cubic-bezier(.6,0,.4,1), box-shadow 1s ease;
    transform: rotateY(-150deg);
    box-shadow: 40px 30px 80px rgba(0,0,0,0.7);
  }
  #cover::before{
    content:"";
    position:absolute;
    inset:14px;
    border:2px solid var(--gold);
    border-radius:3px;
    opacity:0.7;
  }
  /* brilho que percorre a capa ao chegar */
  #cover::after{
    content:"";
    position:absolute;
    inset:0;
    background: linear-gradient(115deg, transparent 30%, rgba(255,238,190,0.35) 48%, transparent 62%);
    transform: translateX(-120%);
    animation: sheen 1.4s ease-out 1.0s 1;
    pointer-events:none;
  }
  @keyframes sheen{
    to{ transform: translateX(120%); }
  }
  .cover-emblem{
    font-size:3.2rem;
    margin-bottom:1.4rem;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
    opacity:0;
    animation: emblem-pop 0.7s cubic-bezier(.34,1.6,.64,1) 0.9s forwards;
  }
  @keyframes emblem-pop{
    0%{ opacity:0; transform: scale(0.3) rotate(-25deg); }
    100%{ opacity:1; transform: scale(1) rotate(0deg); }
  }
  #cover h1{
    color: var(--gold-light);
    text-transform:uppercase;
    letter-spacing:0.12em;
    font-size: clamp(1.6rem, 6vw, 2.4rem);
    line-height:1.25;
    text-shadow: 0 2px 4px rgba(0,0,0,0.6);
    padding: 0 1.5rem;
    opacity:0;
    animation: fade-rise 0.8s ease-out 1.05s forwards;
  }
  #cover .line{
    width:0;
    height:2px;
    background: var(--gold);
    margin:1.1rem 0;
    opacity:0.8;
    animation: line-grow 0.6s ease-out 1.55s forwards;
  }
  @keyframes line-grow{ to{ width:70px; } }
  #cover p.subtitle{
    color: var(--gold-light);
    opacity:0;
    font-size:0.85rem;
    letter-spacing:0.25em;
    text-transform:uppercase;
    animation: fade-rise 0.7s ease-out 1.75s forwards;
  }
  @keyframes fade-rise{
    from{ opacity:0; transform: translateY(10px); }
    to{ opacity:1; transform: translateY(0); }
  }
  #cover .tap-hint{
    margin-top:2.4rem;
    color: var(--gold-light);
    font-size:0.78rem;
    letter-spacing:0.15em;
    opacity:0;
    animation: fade-rise 0.7s ease-out 2.1s forwards, pulse 2s ease-in-out 2.8s infinite;
  }
  @keyframes pulse{
    0%,100%{ opacity:0.4; }
    50%{ opacity:0.9; }
  }

  /* ---------------- LIVRO ---------------- */
  #book{
    width:min(96%, 600px);
    height:min(92%, 740px);
    position:relative;
    opacity:0;
    transform: scale(0.85) translateY(10px);
    transition: opacity 0.8s ease, transform 0.8s ease;
    pointer-events:none;
  }
  #book.show{
    opacity:1;
    transform: scale(1) translateY(0);
    pointer-events:auto;
  }

  .page-area{
    touch-action: pan-y;
    position:relative;
    width:100%;
    height:calc(100% - 56px);
    border-radius: 4px 10px 10px 4px;
    box-shadow:
      0 25px 50px rgba(0,0,0,0.55),
      inset -6px 0 12px rgba(0,0,0,0.12);
    background: var(--paper-shadow);
    overflow:hidden;
  }
  .leaf{
    position:absolute;
    inset:0;
    background:
      linear-gradient(120deg, rgba(0,0,0,0.02) 0%, transparent 12%),
      var(--paper);
    padding: clamp(1.6rem, 4vw, 2.6rem) clamp(1.6rem, 4.5vw, 2.8rem);
    overflow:auto;
    backface-visibility: hidden;
  }
  .leaf::-webkit-scrollbar{ width:6px; }
  .leaf::-webkit-scrollbar-thumb{ background: var(--paper-shadow); border-radius:4px; }

  #base{ z-index:1; }
  #flip{
    z-index:3;
    transform: rotateY(0deg);
    box-shadow: none;
    display:none;
  }
  #flip.visible{ display:block; }

  .page-tag{
    font-size:0.7rem;
    letter-spacing:0.25em;
    text-transform:uppercase;
    color: var(--grass);
    margin-bottom:0.8rem;
    display:block;
  }
  .leaf h2{
    font-size: clamp(1.3rem, 4vw, 1.8rem);
    font-weight:700;
    margin: 0 0 1rem;
    color:#1f1810;
    line-height:1.15;
  }
  .leaf p{
    font-size: clamp(0.92rem, 2vw, 1rem);
    line-height:1.65;
    margin-bottom:0.9rem;
    color:#3a2f20;
  }
  .leaf ul{
    margin:0 0 1rem 1.2rem;
    font-size: clamp(0.92rem, 2vw, 1rem);
    line-height:1.7;
    color:#3a2f20;
  }
  .leaf .big-icon{
    font-size:2.4rem;
    margin-bottom:0.6rem;
  }
  .leaf .center{
    text-align:center;
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
  }
  .titles-row{
    display:flex;
    flex-wrap:wrap;
    gap:0.5rem;
    margin: 0.6rem 0 1rem;
  }
  .titles-row span{
    background: var(--grass);
    color:#fff;
    padding:0.35rem 0.7rem;
    border-radius:5px;
    font-weight:700;
    font-size:0.9rem;
  }
  .rank-list{
    list-style:none;
    margin:0.6rem 0;
    padding:0;
    display:flex;
    flex-direction:column;
    gap:0.45rem;
  }
  .rank-list li{
    display:flex;
    justify-content:space-between;
    border-bottom:1px dashed var(--paper-shadow);
    padding-bottom:0.4rem;
    font-size:0.95rem;
  }
  .rank-list strong{ color: var(--grass); }

  /* numeração de página, estilo livro impresso */
  .leaf .folio{
    position:absolute;
    bottom:0.8rem;
    right:1.2rem;
    font-size:0.75rem;
    color:#8a7c5e;
    font-style:italic;
  }

  /* sombra de "vinco" central do livro */
  .page-area::after{
    content:"";
    position:absolute;
    top:0; bottom:0; left:0;
    width:18px;
    background: linear-gradient(90deg, rgba(0,0,0,0.18), transparent);
    z-index:4;
    pointer-events:none;
  }

  /* ---------------- CONTROLES ---------------- */
  .controls{
    height:56px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 0 0.4rem;
  }
  .btn{
    background: var(--leather);
    color: var(--gold-light);
    border:none;
    width:42px;
    height:42px;
    border-radius:50%;
    font-size:1.1rem;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    transition: transform 0.15s ease, opacity 0.2s ease;
  }
  .btn:hover{ transform: translateY(-2px); }
  .btn:disabled{ opacity:0.25; cursor:default; transform:none; }
  .counter{
    color: var(--gold-light);
    font-size:0.85rem;
    letter-spacing:0.1em;
  }

  .pdf-btn{
    margin-top:1.6rem;
    background: linear-gradient(135deg, var(--gold), #a87f24);
    color: #2b1c08;
    border:none;
    padding:0.8rem 1.6rem;
    border-radius:8px;
    font-family: Georgia, serif;
    font-weight:700;
    font-size:0.95rem;
    letter-spacing:0.04em;
    cursor:pointer;
    box-shadow: 0 6px 16px rgba(0,0,0,0.25);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .pdf-btn:hover{
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
  }
  .pdf-btn:active{ transform: translateY(0); }

  /* overlay com livro ao gerar o PDF */
  #pdfOverlay{
    position:fixed;
    inset:0;
    background: rgba(6,3,1,0.82);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:50;
    opacity:0;
    pointer-events:none;
    transition: opacity 0.35s ease;
  }
  #pdfOverlay.show{
    opacity:1;
    pointer-events:auto;
  }
  .pdf-book{
    display:flex;
    flex-direction:column;
    align-items:center;
    color: var(--gold-light);
  }
  .pdf-book .icon{
    font-size:4.2rem;
    animation: book-flip 1.1s ease-in-out infinite;
    filter: drop-shadow(0 8px 14px rgba(0,0,0,0.5));
  }
  @keyframes book-flip{
    0%{ transform: rotateY(0deg) scale(1); }
    25%{ transform: rotateY(90deg) scale(1.05); }
    50%{ transform: rotateY(180deg) scale(1); }
    75%{ transform: rotateY(270deg) scale(1.05); }
    100%{ transform: rotateY(360deg) scale(1); }
  }
  .pdf-book .label{
    margin-top:1.1rem;
    font-size:0.95rem;
    letter-spacing:0.12em;
    text-transform:uppercase;
    opacity:0.9;
  }
  .pdf-book .dots span{
    animation: dot-blink 1.2s infinite;
    opacity:0;
  }
  .pdf-book .dots span:nth-child(2){ animation-delay:0.2s; }
  .pdf-book .dots span:nth-child(3){ animation-delay:0.4s; }
  @keyframes dot-blink{
    0%,100%{ opacity:0; }
    50%{ opacity:1; }
  }
  .pdf-book .check{
    font-size:2.6rem;
    display:none;
    animation: check-pop 0.5s cubic-bezier(.34,1.6,.64,1) forwards;
  }
  @keyframes check-pop{
    0%{ transform: scale(0.4); opacity:0; }
    100%{ transform: scale(1); opacity:1; }
  }
</style>
</head>
<body>

<div class="stage" id="stage">
  <div class="spotlight"></div>
  <div id="sparks"></div>

  <!-- CAPA -->
  <div id="cover">
    <div class="cover-emblem">🏆</div>
    <h1>A Copa<br>do Mundo</h1>
    <div class="line"></div>
    <p class="subtitle">Trabalho de Português</p>
    <p class="tap-hint">toque para abrir o livro</p>
  </div>

  <!-- LIVRO -->
  <div id="book">
    <div class="page-area">
      <div class="leaf" id="base"></div>
      <div class="leaf" id="flip"></div>
    </div>
    <div class="controls">
      <button class="btn" id="prevBtn" aria-label="Página anterior">‹</button>
      <span class="counter" id="counter">1 / 10</span>
      <button class="btn" id="nextBtn" aria-label="Próxima página">›</button>
    </div>
  </div>

</div>

<div id="pdfOverlay">
  <div class="pdf-book">
    <div class="icon" id="pdfIcon">📖</div>
    <div class="label" id="pdfLabel">Gerando o livro em PDF<span class="dots"><span>.</span><span>.</span><span>.</span></span></div>
  </div>
</div>

<script>
  const pages = [
    `<div class="center">
       <span class="page-tag">Índice</span>
       <h2>Sumário</h2>
       <ul style="text-align:left">
         <li>Introdução</li>
         <li>História da Copa</li>
         <li>Como funciona</li>
         <li>Copa de 2026</li>

         <li>Os maiores campeões</li>
         <li>Curiosidades</li>

       </ul>
     </div>`,

    `<span class="page-tag">01 · Introdução</span>
     <h2>O maior campeonato do mundo</h2>
     <p>A Copa do Mundo é o maior campeonato de futebol do planeta. Ela é organizada pela FIFA e acontece a cada quatro anos, reunindo as melhores seleções nacionais em busca do título de campeã mundial.</p>
     <p>Além de ser um evento esportivo, a Copa também promove a união entre povos e culturas. Milhões de pessoas acompanham os jogos e celebram o esporte mais popular do mundo.</p>`,

    `<span class="page-tag">02 · História</span>
     <h2>Como tudo começou</h2>
     <p>A primeira Copa do Mundo aconteceu em <strong>1930, no Uruguai</strong>. Apenas 13 seleções participaram, e o Uruguai foi o primeiro campeão da história.</p>
     <p>Com o tempo, a Copa cresceu e ganhou grandes nomes, como Pelé, Maradona, Ronaldo Fenômeno, Zidane, Ronaldinho, Messi e Cristiano Ronaldo. Hoje reúne bilhões de telespectadores.</p>`,

    `<span class="page-tag">03 · Formato</span>
     <h2>Como funciona a competição</h2>
     <p>Antes da Copa, as seleções disputam eliminatórias para garantir uma vaga. Na fase final, os países jogam em grupos e os melhores avançam para:</p>
     <ul>
       <li>Oitavas de final</li>
       <li>Quartas de final</li>
       <li>Semifinal</li>
       <li>Disputa de 3º lugar</li>
       <li>Final</li>
     </ul>
     <p>O vencedor da final é coroado campeão mundial e recebe a Taça da Copa.</p>`,

    `<span class="page-tag">04 · Edição atual</span>
     <h2>A Copa do Mundo de 2026</h2>
     <p>Pela primeira vez, o torneio será realizado em <strong>três países ao mesmo tempo</strong>: Estados Unidos, Canadá e México.</p>
     <p>Outra novidade é o número de seleções: <strong>48 times</strong>, a maior Copa já realizada — mais jogos e mais chances para diferentes países disputarem o título.</p>`,

    `<span class="page-tag">05 · O Brasil</span>
     <h2>O Brasil na Copa do Mundo</h2>
     <p>O Brasil é a única seleção que participou de <strong>todas</strong> as edições da Copa e também é a maior campeã da história, com cinco títulos:</p>
     <div class="titles-row">
       <span>1958</span><span>1962</span><span>1970</span><span>1994</span><span>2002</span>
     </div>
     <p>Grandes nomes marcaram essa história: Pelé, Garrincha, Romário, Ronaldo, Rivaldo, Ronaldinho, Kaká e Neymar.</p>`,

    `<span class="page-tag">06 · Recordes</span>
     <h2>Os maiores campeões</h2>
     <ul class="rank-list">
       <li>🥇 Brasil <strong>5 títulos</strong></li>
       <li>🥈 Alemanha <strong>4 títulos</strong></li>
       <li>🥈 Itália <strong>4 títulos</strong></li>
       <li>🥉 Argentina <strong>3 títulos</strong></li>
       <li>🏅 França <strong>2 títulos</strong></li>
       <li>🏅 Uruguai <strong>2 títulos</strong></li>
     </ul>`,

    `<span class="page-tag">07 · Curiosidades</span>
     <h2>Você sabia?</h2>
     <ul>
       <li>A Copa acontece a cada quatro anos.</li>
       <li>Mais de 200 países disputam as eliminatórias.</li>
       <li>A taça pesa cerca de 6 kg e é feita de ouro.</li>
       <li>É transmitida para quase todos os países do mundo.</li>
       <li>É um dos eventos mais assistidos do planeta.</li>
       <li>O Brasil é o único país presente em todas as edições.</li>
     </ul>`,

    `<span class="page-tag">08 · Conclusão</span>
     <h2>Muito mais que futebol</h2>
     <p>A Copa do Mundo representa a união entre povos, culturas e tradições. Durante a competição, milhões de pessoas torcem por suas seleções e compartilham emoções.</p>
     <p>Ela também incentiva valores importantes: respeito, trabalho em equipe, dedicação e superação — por isso é um dos maiores eventos do planeta.</p>`,

    `<div class="center">
       <div class="big-icon">🏆</div>
       <h2>Fim</h2>
       <p style="max-width:320px">Trabalho de Português sobre a Copa do Mundo.</p>
       <p style="font-size:0.8rem;color:#8a7c5e;max-width:320px">
         Referências: site oficial da FIFA · Enciclopédia Britannica · livros e materiais sobre a história da Copa do Mundo.
       </p>
       <button class="pdf-btn" id="downloadPdfBtn">⬇ Baixar PDF</button>
     </div>`
  ];

  // Conteúdo em texto puro, usado para gerar o PDF
  const pdfContent = [
    { title: "A Copa do Mundo", body: "Trabalho de Português" },
    { title: "Sumário", body: "Introdução\nHistória da Copa\nComo funciona\nCopa de 2026\nO Brasil na Copa\nOs maiores campeões\nCuriosidades\nConclusão" },

    { title: "4. A Copa do Mundo de 2026", body: "Pela primeira vez, o torneio será realizado em três países ao mesmo tempo: Estados Unidos, Canadá e México.\n\nOutra novidade é o número de seleções: 48 times, a maior Copa já realizada — mais jogos e mais chances para diferentes países disputarem o título." },
    { title: "5. O Brasil na Copa do Mundo", body: "O Brasil é a única seleção que participou de todas as edições da Copa e também é a maior campeã da história, com cinco títulos: 1958, 1962, 1970, 1994 e 2002.\n\nGrandes nomes marcaram essa história: Pelé, Garrincha, Romário, Ronaldo, Rivaldo, Ronaldinho, Kaká e Neymar." },
    { title: "6. Os maiores campeões", body: "1º Brasil — 5 títulos\n2º Alemanha — 4 títulos\n2º Itália — 4 títulos\n3º Argentina — 3 títulos\n4º França — 2 títulos\n4º Uruguai — 2 títulos" },
    { title: "7. Curiosidades", body: "- A Copa acontece a cada quatro anos.\n- Mais de 200 países disputam as eliminatórias.\n- A taça pesa cerca de 6 kg e é feita de ouro.\n- É transmitida para quase todos os países do mundo.\n- É um dos eventos mais assistidos do planeta.\n- O Brasil é o único país presente em todas as edições." },
    { title: "8. Conclusão", body: "A Copa do Mundo representa a união entre povos, culturas e tradições. Durante a competição, milhões de pessoas torcem por suas seleções e compartilham emoções.\n\nEla também incentiva valores importantes: respeito, trabalho em equipe, dedicação e superação — por isso é um dos maiores eventos do planeta." },
    { title: "Referências", body: "Site oficial da FIFA\nEnciclopédia Britannica\nLivros e materiais sobre a história da Copa do Mundo" }
  ];

  // partículas douradas flutuando
  const sparksEl = document.getElementById('sparks');
  for(let i = 0; i < 26; i++){
    const s = document.createElement('div');
    s.className = 'spark';
    const size = 2 + Math.random() * 3;
    s.style.width = size + 'px';
    s.style.height = size + 'px';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = (60 + Math.random() * 40) + '%';
    s.style.animationDuration = (5 + Math.random() * 6) + 's';
    s.style.animationDelay = (Math.random() * 6) + 's';
    sparksEl.appendChild(s);
  }

  function downloadPdf(){
    const overlay = document.getElementById('pdfOverlay');
    const icon = document.getElementById('pdfIcon');
    const label = document.getElementById('pdfLabel');
    overlay.classList.add('show');

    setTimeout(() => {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit: 'pt', format: 'a4' });
      const marginX = 56;
      const pageWidth = doc.internal.pageSize.getWidth();
      const pageHeight = doc.internal.pageSize.getHeight();
      const maxWidth = pageWidth - marginX * 2;

      pdfContent.forEach((page, idx) => {
        if(idx > 0) doc.addPage();
        let y = 80;

        doc.setFont('times', 'bold');
        doc.setFontSize(20);
        doc.setTextColor(28, 107, 63);
        const titleLines = doc.splitTextToSize(page.title, maxWidth);
        doc.text(titleLines, marginX, y);
        y += titleLines.length * 26 + 16;

        doc.setDrawColor(203, 161, 53);
        doc.setLineWidth(1.2);
        doc.line(marginX, y - 8, marginX + 70, y - 8);

        doc.setFont('times', 'normal');
        doc.setFontSize(12.5);
        doc.setTextColor(43, 32, 20);

        page.body.split('\n').forEach(rawLine => {
          if(rawLine.trim() === ''){
            y += 12;
            return;
          }
          const lines = doc.splitTextToSize(rawLine, maxWidth);
          lines.forEach(line => {
            if(y > pageHeight - 70){
              doc.addPage();
              y = 80;
            }
            doc.text(line, marginX, y);
            y += 19;
          });
        });

        doc.setFontSize(9);
        doc.setTextColor(150, 140, 110);
        doc.text(`${idx + 1} / ${pdfContent.length}`, pageWidth - marginX - 30, pageHeight - 30);
      });

      doc.save('a-copa-do-mundo.pdf');

      icon.style.animation = 'none';
      icon.textContent = '✅';
      label.innerHTML = 'PDF baixado!';

      setTimeout(() => {
        overlay.classList.remove('show');
        icon.style.animation = '';
        icon.textContent = '📖';
        label.innerHTML = 'Gerando o livro em PDF<span class="dots"><span>.</span><span>.</span><span>.</span></span>';
      }, 1100);
    }, 1300);
  }

  document.addEventListener('click', (e) => {
    if(e.target && e.target.id === 'downloadPdfBtn'){
      downloadPdf();
    }
  });

  const cover = document.getElementById('cover');
  const book = document.getElementById('book');
  const base = document.getElementById('base');
  const flip = document.getElementById('flip');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const counter = document.getElementById('counter');

  let current = 0;
  let animating = false;

  function renderFolio(html, index){
    return html + `<span class="folio">${index + 1} / ${pages.length}</span>`;
  }

  function updateUI(){
    base.innerHTML = renderFolio(pages[current], current);
    counter.textContent = `${current + 1} / ${pages.length}`;
    prevBtn.disabled = current === 0;
    nextBtn.disabled = current === pages.length - 1;
  }

  function flipTo(newIndex, direction){
    if(animating || newIndex < 0 || newIndex > pages.length - 1) return;
    animating = true;

    const leavingIndex = current;
    base.innerHTML = renderFolio(pages[newIndex], newIndex);

    flip.innerHTML = renderFolio(pages[leavingIndex], leavingIndex);
    flip.style.transition = 'none';
    flip.style.transformOrigin = direction === 'next' ? 'left center' : 'right center';
    flip.style.transform = direction === 'next' ? 'rotateY(0deg)' : 'rotateY(-180deg)';
    flip.style.boxShadow = direction === 'next' ? '10px 0 30px rgba(0,0,0,0.25)' : '-10px 0 30px rgba(0,0,0,0.25)';
    flip.classList.add('visible');

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        flip.style.transition = 'transform 0.75s cubic-bezier(.45,.05,.55,.95), box-shadow 0.75s ease';
        flip.style.transform = direction === 'next' ? 'rotateY(-180deg)' : 'rotateY(0deg)';
        flip.style.boxShadow = '0 0 0 rgba(0,0,0,0)';
      });
    });

    const onEnd = () => {
      flip.removeEventListener('transitionend', onEnd);
      flip.classList.remove('visible');
      current = newIndex;
      animating = false;
      updateUI();
    };
    flip.addEventListener('transitionend', onEnd);
  }

  prevBtn.addEventListener('click', () => flipTo(current - 1, 'prev'));
  nextBtn.addEventListener('click', () => flipTo(current + 1, 'next'));

  // deslizar com o dedo para virar a página
  const pageArea = document.querySelector('.page-area');
  let touchStartX = 0, touchStartY = 0, touchActive = false;

  pageArea.addEventListener('touchstart', (e) => {
    if(animating) return;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchActive = true;
  }, { passive: true });

  pageArea.addEventListener('touchend', (e) => {
    if(!touchActive) return;
    touchActive = false;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    const SWIPE_MIN = 45;
    if(Math.abs(dx) > SWIPE_MIN && Math.abs(dx) > Math.abs(dy) * 1.4){
      if(dx < 0) flipTo(current + 1, 'next');
      else flipTo(current - 1, 'prev');
    }
  }, { passive: true });

  // arrastar com o mouse (desktop) também vira a página
  let mouseStartX = 0, mouseDown = false;
  pageArea.addEventListener('mousedown', (e) => {
    if(animating) return;
    mouseStartX = e.clientX;
    mouseDown = true;
  });
  window.addEventListener('mouseup', (e) => {
    if(!mouseDown) return;
    mouseDown = false;
    const dx = e.clientX - mouseStartX;
    if(Math.abs(dx) > 60){
      if(dx < 0) flipTo(current + 1, 'next');
      else flipTo(current - 1, 'prev');
    }
  });

  document.addEventListener('keydown', (e) => {
    if(book.classList.contains('show')){
      if(e.key === 'ArrowRight') flipTo(current + 1, 'next');
      if(e.key === 'ArrowLeft') flipTo(current - 1, 'prev');
    }
  });

  // abrir a capa
  cover.addEventListener('click', () => {
    if(cover.classList.contains('opening')) return;
    cover.classList.add('opening');
    updateUI();
    setTimeout(() => {
      book.classList.add('show');
    }, 350);
    setTimeout(() => {
      cover.style.display = 'none';
    }, 1050);
  });
</script>

</body>
